<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Test Client — ACLC API</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #111420; --border: #1e2438;
    --accent: #00d4ff; --accent2: #ff6b35; --success: #22c55e;
    --text: #e2e8f0; --muted: #64748b; --code-bg: #0d1117;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
  .wrap { max-width:900px; margin:0 auto; padding:40px 24px; position:relative; z-index:1; }
  h1 { font-size:32px; font-weight:800; letter-spacing:-1px; margin-bottom:6px; }
  h1 span { color:var(--accent); }
  .sub { color:var(--muted); font-size:14px; margin-bottom:24px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media(max-width:700px){
    .grid{grid-template-columns:1fr;}
    h1{font-size:24px;}
    .wrap{padding:24px 16px;}
    .quick-load-row{gap:6px;}
    .preset{font-size:10px;padding:5px 10px;}
    .row{flex-direction:column;}
    .row .field{max-width:100%!important;}
    #savedTokenRow{flex-direction:column;}
    #savedTokenRow>*{width:100%;}
    .btn{width:100%;}
  }
  @media(max-width:480px){
    h1{font-size:20px;}
    .sub{font-size:12px;}
    .panel-head{flex-wrap:wrap;gap:6px;}
    .quick-load-row{justify-content:center;}
    textarea{min-height:100px;}
  }
  label { display:block; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:1px; margin-bottom:6px; text-transform:uppercase; }
  select, input, textarea {
    width:100%; background:var(--code-bg); border:1px solid var(--border);
    color:var(--text); font-family:'JetBrains Mono',monospace; font-size:13px;
    padding:10px 12px; border-radius:3px; outline:none; transition:border-color .2s;
  }
  select:focus, input:focus, textarea:focus { border-color:var(--accent); }
  textarea { resize:vertical; min-height:140px; }
  .field { margin-bottom:16px; }
  .row { display:flex; gap:10px; align-items:flex-end; }
  .row .field { flex:1; margin-bottom:0; }
  .btn { font-family:'Syne',sans-serif; font-weight:700; font-size:13px; padding:11px 22px; border-radius:3px; cursor:pointer; border:none; transition:all .2s; white-space:nowrap; }
  .btn-primary { background:var(--accent); color:#000; }
  .btn-primary:hover { background:#00b8d9; }
  .btn-sm { font-size:11px; padding:6px 14px; font-family:'JetBrains Mono',monospace; }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--muted); }
  .btn-outline:hover { border-color:var(--accent); color:var(--accent); }
  .method-badge { font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700; padding:3px 8px; border-radius:2px; letter-spacing:1px; }
  .GET    { background:rgba(34,197,94,.1);  color:#22c55e; border:1px solid rgba(34,197,94,.3); }
  .POST   { background:rgba(0,212,255,.1);  color:#00d4ff; border:1px solid rgba(0,212,255,.3); }
  .PATCH  { background:rgba(124,58,237,.1); color:#a78bfa; border:1px solid rgba(124,58,237,.3); }
  .DELETE { background:rgba(239,68,68,.1);  color:#ef4444; border:1px solid rgba(239,68,68,.3); }
  .panel { background:var(--surface); border:1px solid var(--border); border-radius:4px; overflow:hidden; margin-top:20px; }
  .panel-head { display:flex; align-items:center; gap:10px; padding:12px 16px; background:rgba(255,255,255,.02); border-bottom:1px solid var(--border); font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); }
  .status-badge { font-family:'JetBrains Mono',monospace; font-size:11px; padding:2px 8px; border-radius:2px; font-weight:700; }
  .s2xx { background:rgba(34,197,94,.15); color:#22c55e; }
  .s4xx { background:rgba(251,191,36,.15); color:#fbbf24; }
  .s5xx { background:rgba(239,68,68,.15);  color:#ef4444; }
  #responseBody { padding:16px; font-family:'JetBrains Mono',monospace; font-size:12px; line-height:1.7; overflow-x:auto; white-space:pre; color:#94a3b8; min-height:80px; }
  
  .quick-load { margin-bottom:20px; }
  .quick-load-row { display:flex; flex-wrap:wrap; gap:8px; }
  .preset { font-family:'JetBrains Mono',monospace; font-size:11px; padding:6px 12px; border:1px solid var(--border); background:var(--surface); color:var(--muted); cursor:pointer; border-radius:3px; transition:all .2s; }
  .preset:hover { border-color:var(--accent); color:var(--accent); }
  
  .divider { border:none; border-top:1px solid var(--border); margin:24px 0; }
  .token-display { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--success); background:rgba(34,197,94,.06); border:1px solid rgba(34,197,94,.2); padding:8px 12px; border-radius:3px; margin-top:8px; word-break:break-all; display:none; }
  .loading { display:none; color:var(--accent); font-family:'JetBrains Mono',monospace; font-size:12px; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .loading { animation:blink 1s infinite; }
</style>
</head>
<body>
<div class="wrap">
  <h1>ACLC <span>API</span></h1>
  <p class="sub">Student Information Management System — Test Client</p>

  <!-- Quick Load -->
  <div class="quick-load">
    <div class="quick-load-row">
      <button class="preset" onclick="loadPreset('login')">🔑 Login</button>
      <button class="preset" onclick="loadPreset('logout')">🚪 Logout</button>
      <button class="preset" onclick="loadPreset('getBseStudents')">📚 BSE</button>
      <button class="preset" onclick="loadPreset('createBseStudent')">➕ BSE</button>
      <button class="preset" onclick="loadPreset('searchBseStudents')">🔍 BSE</button>
      <button class="preset" onclick="loadPreset('getBsisStudents')">💻 BSIS</button>
      <button class="preset" onclick="loadPreset('createBsisStudent')">➕ BSIS</button>
      <button class="preset" onclick="loadPreset('searchBsisStudents')">🔍 BSIS</button>
      <button class="preset" onclick="loadPreset('getAdmins')">👥 Admins</button>
    </div>
  </div>

  <!-- Token store -->
  <div class="field">
    <label>Saved Bearer Token (auto-filled after login)</label>
    <div id="savedTokenRow" style="display:flex;gap:8px;">
      <input type="text" id="savedToken" placeholder="Token will appear here after login..." />
      <button class="btn btn-outline btn-sm" onclick="useToken()">USE</button>
      <button class="btn btn-outline btn-sm" onclick="clearToken()">CLEAR</button>
    </div>
    <div class="token-display" id="tokenDisplay"></div>
  </div>

  <hr class="divider">

  <!-- Request builder -->
  <div class="grid">
    <div>
      <div class="row" style="margin-bottom:16px;">
        <div class="field" style="max-width:120px;">
          <label>Method</label>
          <select id="method" onchange="updateMethod()">
            <option>GET</option>
            <option>POST</option>
            <option>PATCH</option>
            <option>DELETE</option>
          </select>
        </div>
        <div class="field">
          <label>URL</label>
          <input type="text" id="url" placeholder="/your-folder/api/bse-students" />
        </div>
      </div>
      <div class="field">
        <label>Authorization Header</label>
        <input type="text" id="authHeader" placeholder="Bearer your-token-here" />
      </div>
      <div class="row">
        <div class="field">
          <label>School Year</label>
          <select id="schoolYearSelect" onchange="syncStudentBodyContext()">
            <option value="">Loading school years...</option>
          </select>
        </div>
        <div class="field">
          <label>Semester</label>
          <select id="semesterSelect" onchange="syncStudentBodyContext()">
            <option value="1st Semester">1st Semester</option>
            <option value="2nd Semester">2nd Semester</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Request Body (JSON)</label>
        <textarea id="body" placeholder='{ "key": "value" }'></textarea>
      </div>
      <button class="btn btn-primary" onclick="sendRequest()" style="width:100%">▶ Send Request</button>
      <div class="loading" id="loading" style="margin-top:8px;">⟳ Sending...</div>
    </div>

    <div>
      <div class="panel">
        <div class="panel-head">
          <span>RESPONSE</span>
          <span id="statusBadge" class="status-badge" style="display:none"></span>
          <span id="responseTime" style="margin-left:auto;font-size:10px;"></span>
        </div>
        <pre id="responseBody">// Response will appear here</pre>
      </div>
    </div>
  </div>
</div>

<script>
const IS_FILE_PROTOCOL = window.location.protocol === 'file:';
const PROJECT_PATH = window.location.pathname.split('/public')[0] || '';
const HtdocsMatch = PROJECT_PATH.match(/\/htdocs(\/.*)$/i);
const PROJECT_ROOT = HtdocsMatch ? HtdocsMatch[1] : '/rest-api';
const BASE = IS_FILE_PROTOCOL ? 'http://localhost' : window.location.origin;
const API_PATH = IS_FILE_PROTOCOL ? PROJECT_ROOT : PROJECT_PATH;

const PRESETS = {
  login: {
    method: 'POST', url: API_PATH + '/api/auth/login',
    body: '{\n  "login": "admin@aclc.edu",\n  "password": "your-password"\n}'
  },
  getBseStudents: {
    method: 'GET', url: API_PATH + '/api/bse-students', body: ''
  },
  getBsisStudents: {
    method: 'GET', url: API_PATH + '/api/bsis-students', body: ''
  },
  getBseStudents: {
    method: 'GET', url: API_PATH + '/api/bse-students', body: ''
  },
  getBsisStudents: {
    method: 'GET', url: API_PATH + '/api/bsis-students', body: ''
  },
  searchBseStudents: {
    method: 'GET', url: API_PATH + '/api/bse-students?search=Mac', body: ''
  },
  searchBsisStudents: {
    method: 'GET', url: API_PATH + '/api/bsis-students?search=Meon', body: ''
  },
  getAdmins: {
    method: 'GET', url: API_PATH + '/api/admins', body: ''
  },
  createBseStudent: {
    method: 'POST', url: API_PATH + '/api/bse-students',
    body: '{\n  "student_id": "BSE-2024-001",\n  "name": "Kuya Mac",\n  "program": "BSE",\n  "year_level": "1st Year",\n  "gmail": "kuya.mac@gmail.com",\n  "school_year_id": 0,\n  "semester": "1st Semester"\n}'
  },
  getRemoved: {
    method: 'GET', url: API_PATH + '/api/removed-students', body: ''
  },
  createBsisStudent: {
    method: 'POST', url: API_PATH + '/api/bsis-students',
    body: '{\n  "student_id": "BSIS-2024-001",\n  "name": "Kuya Meon",\n  "program": "BSIS",\n  "year_level": "1st Year",\n  "gmail": "kuya.meon@gmail.com",\n  "school_year_id": 0,\n  "semester": "1st Semester"\n}'
  },
  logout: {
    method: 'POST', url: API_PATH + '/api/auth/logout', body: ''
  },
};

function loadPreset(name) {
  const p = PRESETS[name];
  if (!p) return;
  document.getElementById('method').value = p.method;
  document.getElementById('url').value    = p.url;
  document.getElementById('body').value   = p.body;
  updateMethod();
  syncStudentBodyContext();
}

function updateMethod() {
  const m = document.getElementById('method').value;
  const bodyField = document.getElementById('body');
  bodyField.disabled = m === 'GET' || m === 'DELETE';
  if (bodyField.disabled) bodyField.style.opacity = '0.4';
  else bodyField.style.opacity = '1';
}

function getSchoolYearApiUrl() {
  return 'http://localhost/aclcapi/api/school_years.php';
}

async function loadSchoolYears() {
  const select = document.getElementById('schoolYearSelect');
  try {
    const res = await fetch(getSchoolYearApiUrl());
    const data = await res.json();
    const items = Array.isArray(data) ? data : [];

    if (!items.length) {
      select.innerHTML = '<option value="">No school years found</option>';
      return;
    }

    select.innerHTML = items
      .map((item, index) => {
        const selected = item.is_active || index === items.length - 1 ? ' selected' : '';
        return `<option value="${item.id}"${selected}>SY ${item.label}</option>`;
      })
      .join('');
    syncStudentBodyContext();
  } catch (error) {
    select.innerHTML = '<option value="">Unable to load school years</option>';
  }
}

function syncStudentBodyContext() {
  const url = document.getElementById('url').value.trim();
  if (!/\/api\/(?:bse-students|bsis-students)$/i.test(url)) {
    return;
  }

  const method = document.getElementById('method').value;
  if (method !== 'POST' && method !== 'PATCH' && method !== 'PUT') {
    return;
  }

  const bodyField = document.getElementById('body');
  const raw = bodyField.value.trim();
  if (!raw) {
    return;
  }

  try {
    const payload = JSON.parse(raw);
    const schoolYearValue = Number(document.getElementById('schoolYearSelect').value || 0);
    const semesterValue = document.getElementById('semesterSelect').value || '1st Semester';
    payload.school_year_id = schoolYearValue;
    payload.semester = semesterValue;
    bodyField.value = JSON.stringify(payload, null, 2);
  } catch {}
}

function useToken() {
  const t = document.getElementById('savedToken').value.trim();
  if (t) document.getElementById('authHeader').value = t.startsWith('Bearer ') ? t : `Bearer ${t}`;
}

function clearToken() {
  document.getElementById('savedToken').value  = '';
  document.getElementById('authHeader').value  = '';
  document.getElementById('tokenDisplay').style.display = 'none';
}

async function sendRequest() {
  const method   = document.getElementById('method').value;
  const url      = document.getElementById('url').value.trim();
  const authHdr  = document.getElementById('authHeader').value.trim();
  const bodyText = document.getElementById('body').value.trim();

  const fullUrl = url.startsWith('http') ? url : BASE + url;

  document.getElementById('loading').style.display = 'block';
  document.getElementById('responseBody').textContent = '⟳ Loading...';
  document.getElementById('statusBadge').style.display = 'none';
  document.getElementById('responseTime').textContent = '';

  const headers = { 'Content-Type': 'application/json' };
  if (authHdr) headers['Authorization'] = authHdr;

  const options = { method, headers };
  if (bodyText && method !== 'GET' && method !== 'DELETE') {
    try { JSON.parse(bodyText); } catch(e) {
      document.getElementById('responseBody').textContent = '✗ Invalid JSON in request body:\n' + e.message;
      document.getElementById('loading').style.display = 'none';
      return;
    }
    options.body = bodyText;
  }

  const t0 = performance.now();
  try {
    const res  = await fetch(fullUrl, options);
    const ms   = Math.round(performance.now() - t0);
    const text = await res.text();

    let formatted;
    try { formatted = JSON.stringify(JSON.parse(text), null, 2); }
    catch { formatted = text; }

    // Syntax-highlight JSON
    document.getElementById('responseBody').innerHTML = highlight(formatted);

    // Status badge
    const badge = document.getElementById('statusBadge');
    badge.textContent = res.status + ' ' + res.statusText;
    badge.className   = 'status-badge ' + (res.status < 300 ? 's2xx' : res.status < 500 ? 's4xx' : 's5xx');
    badge.style.display = 'inline-block';
    document.getElementById('responseTime').textContent = ms + 'ms';

    // Auto-capture token from login response
    try {
      const json = JSON.parse(text);
      if (json?.data?.token) {
        document.getElementById('savedToken').value = json.data.token;
        const td = document.getElementById('tokenDisplay');
        td.textContent = '✓ Token saved: ' + json.data.token;
        td.style.display = 'block';
      }
    } catch {}

  } catch (err) {
    document.getElementById('responseBody').textContent = '✗ Network error:\n' + err.message;
  }
  document.getElementById('loading').style.display = 'none';
}

function highlight(json) {
  return json
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m => {
      let cls = 'color:#f78c6c'; // number
      if (/^"/.test(m)) {
        cls = /:$/.test(m) ? 'color:#82aaff' : 'color:#c3e88d'; // key or string
      } else if (/true|false/.test(m)) {
        cls = 'color:#c792ea';
      } else if (/null/.test(m)) {
        cls = 'color:#546e7a';
      }
      return `<span style="${cls}">${m}</span>`;
    });
}

// Init
updateMethod();
loadSchoolYears();
</script>
</body>
</html>
